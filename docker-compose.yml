version: "3.9"

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks: [app-net]
  depends_on:
    postgres:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy

services:
  # ── Infrastructure ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/pg-init-dbs.sh:/docker-entrypoint-initdb.d/init.sh
    ports:
      - "5432:5432"
    networks: [app-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: rabbit
      RABBITMQ_DEFAULT_PASS: rabbit
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rmq_data:/var/lib/rabbitmq
    networks: [app-net]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ── Services ─────────────────────────────────────────────────────────
  auth-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
      args:
        SERVICE: auth-service
    ports:
      - "3001:3001"
    env_file: ./apps/auth-service/.env.docker

  product-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
      args:
        SERVICE: product-service
    ports:
      - "3002:3002"
    env_file: ./apps/product-service/.env.docker

  orders-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
      args:
        SERVICE: orders-service
    ports:
      - "3003:3003"
    env_file: ./apps/orders-service/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      product-service:
        condition: service_started

  api-gateway:
    <<: *service-defaults
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
      args:
        SERVICE: api-gateway
    ports:
      - "3000:3000"
    env_file: ./apps/api-gateway/.env.docker
    depends_on:
      - auth-service
      - product-service
      - orders-service

volumes:
  pg_data:
  rmq_data:

networks:
  app-net:
    driver: bridge
